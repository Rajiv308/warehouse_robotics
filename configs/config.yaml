environment:
  sim_timestep: 0.01        # seconds per physics step
  max_episode_steps: 500    # max steps before episode resets
  num_objects: 3            # number of objects in warehouse
  workspace_size: 2.0       # meters, size of robot workspace
  camera_width: 224         # image width fed to ResNet
  camera_height: 224        # image height fed to ResNet

model:
  vision_backbone: resnet18
  language_model: distilbert-base-uncased
  vision_features: 512      # output size of ResNet-18
  language_features: 768    # output size of DistilBERT
  fusion_dim: 256           # cross-attention fusion output size
  action_dim: 7             # 6 joint angles + 1 gripper

training:
  batch_size: 32
  learning_rate: 0.00005
  bc_epochs: 30             # behavioral cloning epochs
  rl_episodes: 1000         # reinforcement learning episodes
  gamma: 0.99               # discount factor for future rewards
  checkpoint_interval: 10   # save model every N epochs

data:
  num_demonstrations: 200   # expert demos to collect
  train_split: 0.8          # 80% train, 20% validation
  data_dir: data/demos

logging:
  log_dir: logs
  tensorboard: true
